<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>钢材表面异常视觉系统</title>
  <link rel="stylesheet" href="/static/styles.css">
  <link rel="stylesheet" href="/static/qa-fixes.css">
</head>
<body>
  <header class="topbar">
    <div><span class="logo">SV</span><strong>钢材表面异常视觉系统</strong><small>Demo Platform</small></div>
    <nav><button data-view="overview" class="nav active">系统概览</button><button data-view="review" class="nav">标注复核</button></nav>
    <div id="health" class="health">就绪检查中</div>
  </header>

  <main id="overviewView" class="view overview">
    <section class="hero"><p>STEEL VISION / LOCAL DEMO</p><h1>从原始图像到可追溯模型，<br>跑通真实数据闭环。</h1><span>本机模块化单体 · SQLite · 不可变资产 · 人机协同复核</span></section>
    <section id="metricCards" class="metric-grid"></section>
    <section class="overview-grid">
      <article class="panel"><header><h2>复核进度</h2><span id="roundLabel">当前轮次</span></header><div id="reviewChart" class="progress-wrap"></div></article>
      <article class="panel"><header><h2>平台状态</h2><span>真实数据库投影</span></header><div id="platformState" class="state-list"></div></article>
    </section>
    <section class="overview-grid overview-detail-grid">
      <article class="panel"><header><h2>逐类复核</h2><span>有效完成 / 目标</span></header><div id="classDistribution" class="state-list"></div></article>
      <article class="panel"><header><h2>风险与最近活动</h2><span>数据库实时投影</span></header><div id="riskActivity" class="state-list"></div></article>
    </section>
  </main>

  <main id="reviewView" class="view review-layout hidden">
    <aside id="queuePanel" class="queue-panel">
      <div class="queue-head"><div><b>待复核队列</b><small id="queueCount">0 项</small></div><button id="closeQueue" title="Q 收起">×</button></div>
      <div class="filters">
        <input id="searchFilter" placeholder="搜索文件名">
        <select id="classFilter"><option value="">全部类别</option><option value="0">Cr</option><option value="1">In</option><option value="2">Pa</option><option value="3">PS</option><option value="4">RS</option><option value="5">Sc</option></select>
        <select id="stateFilter"><option value="">全部状态</option><option value="pending">待复核</option><option value="accepted">已接受</option><option value="corrected">已修正</option><option value="doubtful">存疑</option><option value="excluded">已排除</option></select>
      </div>
      <div id="queueList" class="queue-list"></div>
    </aside>

    <section class="editor-panel">
      <div class="editor-toolbar">
        <button id="openQueue" class="queue-toggle hidden">☰ 队列</button>
        <div><strong id="filename">请选择图片</strong><span id="itemPosition"></span></div>
        <div class="toolset"><button id="undoBtn" title="Ctrl+Z">↶</button><button id="redoBtn" title="Ctrl+Y">↷</button><button id="newBoxBtn" title="R 新建框">＋ 新建框</button><button id="deleteBtn" title="Delete 删除框">删除</button><button id="resetViewBtn">适合窗口</button></div>
      </div>
      <div id="canvasStage" class="canvas-stage"><canvas id="reviewCanvas"></canvas><div id="emptyCanvas">从左侧队列选择一张图片</div></div>
      <div class="shortcut-bar"><span><kbd>滚轮</kbd> 缩放</span><span><kbd>Alt/中键拖动</kbd> 平移</span><span><kbd>R</kbd> 新框</span><span><kbd>Delete</kbd> 删除</span><span><kbd>Q</kbd> 队列</span></div>
    </section>

    <aside class="detail-panel">
      <div class="detail-title"><small>复核信息</small><span id="dirtyBadge" class="badge hidden">未保存</span></div>
      <dl id="itemMeta"><dt>状态</dt><dd>—</dd></dl>
      <label class="note-label">复核备注<textarea id="note" rows="4" placeholder="存疑说明或排除原因"></textarea></label>
      <div class="decision-stack">
        <button id="acceptBtn" class="primary">接受并下一张 <kbd>A</kbd></button>
        <button id="saveBtn">保存修正并下一张 <kbd>S</kbd></button>
        <button id="doubtBtn">存疑并保存草稿 <kbd>D</kbd></button>
        <button id="excludeBtn" class="danger">排除 <kbd>X</kbd></button>
      </div>
      <p id="message" class="message"></p>
    </aside>
  </main>
  <script src="/static/app.js" defer></script>
</body>
</html>
